name: Trigger auto deployment for carenota-ai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CARENOTAAI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CARENOTAAI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CARENOTAAI_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.CARENOTAAI_REGISTRY_URL }}
          username: ${{ secrets.CARENOTAAI_REGISTRY_USERNAME }}
          password: ${{ secrets.CARENOTAAI_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.CARENOTAAI_REGISTRY_URL }}/carenota-ai:${{ github.sha }} .
          docker push ${{ secrets.CARENOTAAI_REGISTRY_URL }}/carenota-ai:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: CareNota4
          containerAppName: carenota-ai
          imageToDeploy: ${{ secrets.CARENOTAAI_REGISTRY_URL }}/carenota-ai:${{ github.sha }}
          environmentVariables: GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}